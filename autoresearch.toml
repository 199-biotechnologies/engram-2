# engram v2 — autoresearch loop config
#
# Current goal: beat Cohere's 78.8% LoCoMo-full-mini end-to-end QA accuracy.
# Every experiment modifies scripts/experiment.vars (the "target file") to
# flip ONE knob at a time: reranker provider, embed model, top-k, etc.
# eval_command sources those vars, runs a deterministic 50-question slice
# of LoCoMo-QA, and prints the accuracy as a bare float.

target_file     = "scripts/experiment.vars"
eval_command    = "./scripts/eval_locomo_slice.sh"
metric_name     = "locomo_qa_accuracy_50q"
metric_direction = "maximize"
time_budget_seconds = 2400   # 40 min ceiling per experiment; 50q Cohere ~3min, 50q MLX ~15min
branch          = "feat/mlx-reranker"

[bounds]
implausible_above = 1.001
implausible_below = 0.0
