# engram v2 — autoresearch loop config
#
# The fast loop targets the inline mini benchmark (10 questions, runs in <1s).
# When R@1 saturates near 1.0 on the mini set, switch eval_command to
# `cargo build --quiet 2>&1 >/dev/null && ./target/debug/engram bench longmemeval --json`
# and metric_path to `data.recall_at_5`.

target_file     = "crates/engram-bench/src/mini.rs"
eval_command    = "cargo build --quiet 2>&1 >/dev/null && ./target/debug/engram bench mini --json | jq -r '.data.recall_at_1'"
metric_name     = "recall_at_1"
metric_direction = "maximize"
time_budget_seconds = 180
branch          = "autoresearch/retrieval-mini-r1"

[bounds]
implausible_above = 1.001
implausible_below = 0.0
